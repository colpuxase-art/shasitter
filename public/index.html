<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Le QG - Shanunu</title>

  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link href="css/styles.css" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --pk-red: rgba(220,53,69,1);
      --pk-amber: rgba(255,193,7,1);
      --glass: rgba(255,255,255,.06);
      --glass2: rgba(255,255,255,.10);
      --line: rgba(255,255,255,.10);
      --text2: rgba(255,255,255,.70);
    }

    body.bg-dark{
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(255,193,7,.12), transparent 60%),
        radial-gradient(800px 500px at 85% 15%, rgba(220,53,69,.16), transparent 60%),
        radial-gradient(900px 700px at 60% 80%, rgba(0,180,255,.10), transparent 55%),
        linear-gradient(180deg, #05060b, #070915 45%, #05060b);
      position: relative;
      overflow-x: hidden;
    }
    body.bg-dark::before{
      content:"";
      position:fixed; inset:0;
      background-image:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,.08) 0 1px, transparent 2px);
      background-size: 320px 320px, 420px 420px, 520px 520px;
      opacity:.25;
      animation: starsDrift 14s linear infinite;
      pointer-events:none;
      mix-blend-mode: screen;
    }
    @keyframes starsDrift{
      0%{ transform: translate3d(0,0,0); }
      100%{ transform: translate3d(-60px, 40px, 0); }
    }

    .panel { display:none; }
    .panel.active { display:block; }

    .control-pill, .mini, .bottom-nav, .bn-item, #toast { /* ton style original */ }

    /* Style amélioré pour les réservations à venir */
    .reservation-groups { margin-top: 12px; }

    .day-header {
      cursor: pointer;
      font-size: 1.18rem;
      font-weight: 700;
      color: #ffdd57;
      background: rgba(255,221,87,0.08);
      border-radius: 12px 12px 0 0;
      padding: 12px 16px;
      margin: 20px 0 0 0;
      position: relative;
    }
    .day-header::after {
      content: '▼';
      position: absolute;
      right: 16px;
      transition: transform 0.3s;
    }
    .day-header.collapsed::after { transform: rotate(-90deg); }

    .reservation-day-group {
      overflow: hidden;
      transition: all 0.4s ease;
      max-height: 3000px;
      background: rgba(0,0,0,0.35);
      border-radius: 0 0 12px 12px;
      padding: 12px;
    }
    .reservation-day-group.collapsed { max-height: 0; padding: 0; }

    .res-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      margin-bottom: 10px;
    }

    .res-icon { font-size: 2.4rem; width: 50px; text-align: center; }
    .res-client { font-weight: 700; font-size: 1.12rem; }
    .res-subtitle { color: rgba(255,255,255,.8); font-size: 0.96rem; }
  </style>
</head>
<body class="bg-dark">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger">
    <div class="container">
      <a class="navbar-brand fw-bold text-danger" href="#">ShaSitter</a>
      <div class="d-flex gap-2">
        <button id="themeBtn" class="btn btn-sm btn-outline-warning" type="button">✨ Thème</button>
        <button id="refreshBtn" class="btn btn-sm btn-outline-light" type="button">↻ Refresh</button>
        <button id="closeBtn" class="btn btn-sm btn-outline-danger" type="button">Fermer</button>
      </div>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="py-4 bg-black">
    <div class="container">
      <div class="p-3 rounded-4 border border-danger pokedex-header">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <div class="pokedex-lights">
            <span class="big"></span>
            <span class="s red"></span>
            <span class="s yellow"></span>
            <span class="s green"></span>
          </div>
          <div>
            <h1 class="h3 mb-1 text-white">Dashboard ShaSitter</h1>
            <p class="mb-0 text-secondary">
              Gestion privée (admin) — prestations, clients, réservations, compta.
            </p>
          </div>
        </div>
        <div class="message-special mt-3" style="font-size:1.15rem; color:#ffd700; text-align:center;">
          <!-- Message changé chaque jour par JS -->
        </div>
      </div>
    </div>
  </header>

  <main class="py-4">
    <div class="container">

      <!-- HOME - Seulement à venir, sans prix -->
      <section id="panelHome" class="panel active">
        <div class="row g-4">
          <div class="col-lg-5">
            <div class="card card-soft text-white">
              <div class="card-body">
                <div class="control-pill mb-3">
                  <div class="d-flex justify-content-between flex-wrap gap-2">
                    <div><div class="muted">Total</div><div class="kpi"><span id="kpiTotalAll">—</span> CHF</div></div>
                    <div><div class="muted">ShaSitter</div><div class="kpi text-warning"><span id="kpiTotalCompany">—</span> CHF</div></div>
                    <div><div class="muted">Employés</div><div class="kpi text-danger"><span id="kpiTotalEmployees">—</span> CHF</div></div>
                  </div>
                </div>

                <div class="mini">
                  <div class="fw-bold mb-2">⏰ À venir (résumé)</div>
                  <div class="muted">Réservations: <span id="kpiUpcomingCount">—</span></div>
                  <div class="muted">Prochaine: <span id="kpiNextBooking">—</span></div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-lg-7">
            <div class="card card-soft text-white">
              <div class="card-body">
                <h2 class="h4 mb-3">📅 Réservations à venir</h2>
                <div id="upcomingList" class="reservation-groups"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Les autres sections restent IDENTIQUES à ta version de base -->
      <!-- Clients, Prestations, Bookings, Compta -->

    </div>
  </main>

  <footer class="py-4 bg-black border-top border-danger">
    <div class="container text-center text-secondary">
      ShaSitter © <span id="year"></span>
    </div>
  </footer>

  <div id="toast">—</div>

  <nav id="bottomNav" class="bottom-nav">
    <button id="btnHome" class="bn-item active"><span class="bn-ico">🏠</span><span class="bn-txt">Accueil</span></button>
    <button id="btnClients" class="bn-item"><span class="bn-ico">👤</span><span class="bn-txt">Clients</span></button>
    <button id="btnPrestations" class="bn-item"><span class="bn-ico">🐾</span><span class="bn-txt">Prestations</span></button>
    <button id="btnBookings" class="bn-item"><span class="bn-ico">📅</span><span class="bn-txt">Réservations</span></button>
    <button id="btnCompta" class="bn-item"><span class="bn-ico">💰</span><span class="bn-txt">Compta</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pokedex.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
