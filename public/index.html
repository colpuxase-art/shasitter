<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>ShaSitter</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link href="css/styles.css" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
  :root { --amber: #ffc107; --red: #dc3545; }
  body.bg-dark {
    background: linear-gradient(180deg, #0a0e17, #111827);
    color: #e9ecef;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
  }
  .panel { display:none; }
  .panel.active { display:block; }

  .card-soft {
    background: rgba(30,41,59,0.92);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
  }

  .mini {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
  }

  /* ←←← ICI LA CORRECTION PRINCIPALE */
  .kpi {
    font-size: 1.38rem !important;   /* plus petit pour que ça rentre */
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  .day-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px;
    margin: 12px 0;
  }

  .slot-pill {
    background: rgba(255,193,7,0.2);
    color: #ffc107;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 0.95rem;
    font-weight: 600;
  }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,23,42,0.97);
    padding: 14px 16px 30px;
    display: flex; gap: 8px; z-index: 1000;
  }

  .bn-item {
    flex: 1; padding: 12px 8px; border-radius: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.13);
    color: white; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }

  .bn-item.active {
    background: rgba(255,193,7,0.18);
    border-color: var(--amber);
    box-shadow: 0 0 22px rgba(255,193,7,0.4);
  }

  #toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.92); color: white; padding: 16px 28px;
    border-radius: 18px; z-index: 2000; display: none; font-size: 1.12rem;
  }
</style>
</head>
<body class="bg-dark">

  <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger px-3 py-2">
    <a class="navbar-brand fw-bold text-danger" href="#">ShaSitter</a>
    <div class="ms-auto d-flex gap-2">
      <button id="refreshBtn" class="btn btn-sm btn-outline-light">↻ Refresh</button>
      <button id="closeBtn" class="btn btn-sm btn-outline-danger">Fermer</button>
    </div>
  </nav>

  <main class="py-4 px-3">
    <div class="container">

      <!-- ACCUEIL -->
      <section id="panelHome" class="panel active">
        <div class="card-soft p-4 mb-4 text-center">
          <h5 class="text-warning mb-3">💜 Message du jour pour Shana 💜</h5>
          <p id="dailyMessage" class="fs-5 fw-light"></p>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-4 text-center"><div class="mini"><small class="muted">Total</small><div class="kpi" id="kpiTotalAll">—</div></div></div>
          <div class="col-4 text-center"><div class="mini"><small class="muted">ShaSitter</small><div class="kpi text-warning" id="kpiTotalCompany">—</div></div></div>
          <div class="col-4 text-center"><div class="mini"><small class="muted">Employés</small><div class="kpi text-danger" id="kpiTotalEmployees">—</div></div></div>
        </div>

        <div class="card-soft">
          <div class="card-body">
            <h5 class="mb-3">⏰ Réservations à venir</h5>
            <div id="upcomingAccordion" class="accordion"></div>
          </div>
        </div>
      </section>

      <!-- CLIENTS -->
      <section id="panelClients" class="panel">
        <div class="card-soft p-3">
          <input id="clientsSearch" class="form-control bg-dark text-white mb-3" placeholder="Rechercher client..." type="search">
          <div id="clientsList"></div>
        </div>
      </section>

      <!-- PRESTATIONS -->
      <section id="panelPrestations" class="panel">
        <div class="card-soft p-3">
          <div class="d-flex gap-2 mb-3">
            <select id="prestaAnimalFilter" class="form-select bg-dark text-white">
              <option value="all">Tous les animaux</option>
              <option value="chat">🐱 Chats</option>
              <option value="lapin">🐰 Lapins</option>
              <option value="autre">🐾 Autres</option>
            </select>
            <input id="prestaSearch" class="form-control bg-dark text-white" placeholder="Nom de la prestation..." type="search">
          </div>
          <div id="prestationsGrid"></div>
        </div>
      </section>

      <!-- ===================== RÉSERVATIONS ===================== -->
<section id="panelBookings" class="panel">
  <div class="card-soft p-3 mb-4">
    <div class="d-flex flex-wrap gap-2 align-items-end">
      <div class="flex-grow-1">
        <select id="bookingsClientFilter" class="form-select bg-dark text-white"></select>
      </div>
      <button id="bookingsExportAll" class="btn btn-success">📅 Exporter .ics</button>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-6">
      <div class="card-soft p-3">
        <h6 class="mb-3">⏰ À venir</h6>
        <div id="bookingsUpcoming" class="list-group"></div>
      </div>
    </div>
    <div class="col-6">
      <div class="card-soft p-3">
        <h6 class="mb-3">🧾 Passées</h6>
        <div id="bookingsPast" class="list-group"></div>
      </div>
    </div>
  </div>
</section>
      <!-- ===================== COMPTA ===================== -->
<section id="panelCompta" class="panel">
  <div class="card-soft p-4 mb-4">
    <h5 class="mb-3">💰 Comptabilité Globale</h5>
    <div class="row g-3 text-center">
      <div class="col-4"><div class="mini"><small class="muted">Total</small><div class="kpi" id="comptaTotal">—</div></div></div>
      <div class="col-4"><div class="mini"><small class="muted">ShaSitter</small><div class="kpi text-warning" id="comptaCo">—</div></div></div>
      <div class="col-4"><div class="mini"><small class="muted">Employés</small><div class="kpi text-danger" id="comptaEmp">—</div></div></div>
    </div>
  </div>

  <div class="card-soft p-3">
    <h6 class="mb-3">Détails par client</h6>
    
    <select id="comptaClientFilter" class="form-select bg-dark text-white mb-3"></select>

    <!-- Totaux du client -->
    <div id="clientComptaDetails" class="row g-3 mt-3" style="display:none;">
      <div class="col-4 text-center"><div class="mini"><small class="muted">Total payé</small><div class="kpi" id="cClientTotal">—</div></div></div>
      <div class="col-4 text-center"><div class="mini"><small class="muted">ShaSitter</small><div class="kpi text-warning" id="cClientCo">—</div></div></div>
      <div class="col-4 text-center"><div class="mini"><small class="muted">Employés</small><div class="kpi text-danger" id="cClientEmp">—</div></div></div>
    </div>

    <!-- Liste groupée par Prestation -->
    <div id="clientBookingsByPresta" class="mt-4" style="display:none;"></div>
  </div>
</section>
    </div>
  </main>

  <footer class="py-3 text-center text-secondary">ShaSitter © <span id="year"></span></footer>

  <div id="toast"></div>

  <nav class="bottom-nav">
    <button id="btnHome" class="bn-item active"><span>🏠</span><span>Accueil</span></button>
    <button id="btnClients" class="bn-item"><span>👤</span><span>Clients</span></button>
    <button id="btnPrestations" class="bn-item"><span>🐾</span><span>Prestas</span></button>
    <button id="btnBookings" class="bn-item"><span>📅</span><span>Résas</span></button>
    <button id="btnCompta" class="bn-item"><span>💰</span><span>Compta</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pokedex.js"></script>
</body>
</html>
