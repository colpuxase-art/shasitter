<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>ShaSitter</title>
  <link rel="icon" href="assets/favicon.ico" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body { background:#0a0e17; color:#e9ecef; font-family:system-ui; }
    .panel { display:none; }
    .panel.active { display:block; }
    .card-soft { background:rgba(30,41,59,0.9); border:1px solid rgba(255,255,255,0.1); border-radius:20px; }
    .day-card { background:rgba(255,255,255,0.06); border-radius:16px; padding:16px; margin:10px 0; }
    .slot-pill { background:rgba(255,193,7,0.15); color:#ffc107; padding:4px 12px; border-radius:20px; font-size:0.95rem; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(15,23,42,0.97); padding:12px 16px 28px; display:flex; gap:8px; z-index:1000; }
    .bn-item { flex:1; padding:12px 6px; border-radius:18px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); color:white; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .bn-item.active { background:rgba(255,193,7,0.18); border-color:#ffc107; box-shadow:0 0 20px rgba(255,193,7,0.35); }
    #toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.92); color:white; padding:16px 28px; border-radius:18px; z-index:2000; display:none; font-size:1.1rem; }
    .accordion-button { background:rgba(255,255,255,0.07)!important; color:white!important; border-radius:16px!important; }
  </style>
</head>
<body class="bg-dark">

  <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger px-3">
    <a class="navbar-brand fw-bold text-danger" href="#">ShaSitter</a>
    <div class="ms-auto d-flex gap-2">
      <button id="refreshBtn" class="btn btn-sm btn-outline-light">↻ Refresh</button>
      <button id="closeBtn" class="btn btn-sm btn-outline-danger">Fermer</button>
    </div>
  </nav>

  <main class="py-4 px-3">
    <div class="container">

      <!-- ACCUEIL -->
      <section id="panelHome" class="panel active">
        <div class="card-soft p-4 mb-4 text-center">
          <h5 class="text-warning mb-3">💜 Message du jour pour Shana 💜</h5>
          <p id="dailyMessage" class="fs-5 fw-light"></p>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-4 text-center"><div class="card-soft p-3"><small class="muted">Total</small><div class="fw-bold fs-4" id="kpiTotalAll">—</div></div></div>
          <div class="col-4 text-center"><div class="card-soft p-3"><small class="muted">ShaSitter</small><div class="fw-bold fs-4 text-warning" id="kpiTotalCompany">—</div></div></div>
          <div class="col-4 text-center"><div class="card-soft p-3"><small class="muted">Employés</small><div class="fw-bold fs-4 text-danger" id="kpiTotalEmployees">—</div></div></div>
        </div>

        <div class="card-soft">
          <div class="card-body">
            <h5 class="mb-3">⏰ Réservations à venir</h5>
            <div id="upcomingAccordion" class="accordion"></div>
          </div>
        </div>
      </section>

      <!-- CLIENTS -->
      <section id="panelClients" class="panel">
        <div class="card-soft p-3">
          <input id="clientsSearch" class="form-control bg-dark text-white mb-3" placeholder="Rechercher client..." type="search">
          <div id="clientsList"></div>
        </div>
      </section>

      <!-- PRESTATIONS -->
      <section id="panelPrestations" class="panel">
        <div class="card-soft p-3">
          <div class="d-flex gap-2 mb-3">
            <select id="prestaAnimalFilter" class="form-select bg-dark text-white"><option value="all">Tous</option><option value="chat">🐱 Chats</option><option value="lapin">🐰 Lapins</option><option value="autre">🐾 Autres</option></select>
            <input id="prestaSearch" class="form-control bg-dark text-white" placeholder="Nom..." type="search">
          </div>
          <div id="prestationsGrid"></div>
        </div>
      </section>

      <!-- RÉSERVATIONS -->
      <section id="panelBookings" class="panel">
        <div class="card-soft p-3 mb-3">
          <select id="bookingsClientFilter" class="form-select bg-dark text-white mb-3"></select>
        </div>
        <div class="row g-3">
          <div class="col-6"><div class="card-soft p-3"><h6>⏰ À venir</h6><div id="bookingsUpcoming"></div></div></div>
          <div class="col-6"><div class="card-soft p-3"><h6>🧾 Passées</h6><div id="bookingsPast"></div></div></div>
        </div>
      </section>

      <!-- COMPTA -->
      <section id="panelCompta" class="panel">
        <div class="card-soft p-4 mb-4">
          <h5 class="mb-3">💰 Comptabilité Globale</h5>
          <div class="row g-3 text-center">
            <div class="col-4"><div class="card-soft p-3"><small>Total</small><div class="fw-bold fs-4" id="comptaTotal">—</div></div></div>
            <div class="col-4"><div class="card-soft p-3"><small>ShaSitter</small><div class="fw-bold fs-4 text-warning" id="comptaCo">—</div></div></div>
            <div class="col-4"><div class="card-soft p-3"><small>Employés</small><div class="fw-bold fs-4 text-danger" id="comptaEmp">—</div></div></div>
          </div>
        </div>

        <div class="card-soft p-3">
          <h6 class="mb-3">Détails par client</h6>
          <select id="comptaClientFilter" class="form-select bg-dark text-white mb-3"></select>
          <div id="clientComptaDetails" class="row g-3" style="display:none;">
            <div class="col-4 text-center"><div class="card-soft p-3"><small>Total payé</small><div class="fw-bold fs-4" id="cClientTotal">—</div></div></div>
            <div class="col-4 text-center"><div class="card-soft p-3"><small>ShaSitter</small><div class="fw-bold fs-4 text-warning" id="cClientCo">—</div></div></div>
            <div class="col-4 text-center"><div class="card-soft p-3"><small>Employés</small><div class="fw-bold fs-4 text-danger" id="cClientEmp">—</div></div></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="py-3 text-center text-secondary">ShaSitter © <span id="year"></span></footer>
  <div id="toast"></div>

  <nav class="bottom-nav">
    <button id="btnHome" class="bn-item active"><span>🏠</span><span>Accueil</span></button>
    <button id="btnClients" class="bn-item"><span>👤</span><span>Clients</span></button>
    <button id="btnPrestations" class="bn-item"><span>🐾</span><span>Prestas</span></button>
    <button id="btnBookings" class="bn-item"><span>📅</span><span>Résas</span></button>
    <button id="btnCompta" class="bn-item"><span>💰</span><span>Compta</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pokedex.js"></script>
</body>
</html>
